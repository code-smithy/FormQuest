openapi: 3.1.0
info:
  title: Fitness RPG API
  version: 0.2.0
  description: Phase 1 + Phase 2 API contract for activity ingestion/history and battle flow.
servers:
  - url: https://api.formquest.local
paths:
  /activity/ingest:
    post:
      summary: Ingest activity events and apply progression updates
      operationId: ingestActivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/ActivityEvent'
      responses:
        '200':
          description: Ingest processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
        '400':
          description: Validation error
  /activity/history:
    get:
      summary: Retrieve normalized activity history
      operationId: getActivityHistory
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          required: false
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
          required: false
      responses:
        '200':
          description: Paginated activity history
          content:
            application/json:
              schema:
                type: object
                required: [events]
                properties:
                  next_cursor:
                    type: string
                    nullable: true
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivityHistoryEvent'
  /battle/start:
    post:
      summary: Start and resolve a deterministic battle
      operationId: startBattle
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BattleStartRequest'
      responses:
        '200':
          description: Battle started and resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattleStartResponse'
        '400':
          description: Validation error
        '409':
          description: Insufficient meta stamina or active battle conflict
  /battle/result/{battleId}:
    get:
      summary: Retrieve persisted battle result by ID
      operationId: getBattleResult
      parameters:
        - in: path
          name: battleId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Battle result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattleRecord'
        '404':
          description: Battle not found
components:
  schemas:
    ActivityEvent:
      type: object
      required:
        - source_event_id
        - type
        - duration_minutes
        - calories
        - occurred_at
        - source
      properties:
        source_event_id:
          type: string
          minLength: 1
        type:
          type: string
          enum: [walking, running, cycling, strength, other]
        duration_minutes:
          type: integer
          minimum: 1
          maximum: 240
        calories:
          type: number
          minimum: 0
        steps:
          type: integer
          minimum: 0
          nullable: true
        heart_rate_avg:
          type: integer
          minimum: 0
          nullable: true
        occurred_at:
          type: string
          format: date-time
        source:
          type: string
          enum: [apple_health, google_fit, manual_import]
    IngestResponse:
      type: object
      required:
        - accepted
        - duplicates
        - quarantined
        - awarded_xp
        - awarded_meta_stamina
        - user
      properties:
        accepted:
          type: integer
          minimum: 0
        duplicates:
          type: integer
          minimum: 0
        quarantined:
          type: integer
          minimum: 0
        awarded_xp:
          type: integer
          minimum: 0
        awarded_meta_stamina:
          type: integer
          minimum: 0
        user:
          type: object
          required: [xp_total, level, meta_stamina]
          properties:
            xp_total:
              type: integer
              minimum: 0
            level:
              type: integer
              minimum: 1
            meta_stamina:
              type: integer
              minimum: 0
              maximum: 5000
    ActivityHistoryEvent:
      allOf:
        - $ref: '#/components/schemas/ActivityEvent'
        - type: object
          required: [status, credited_xp, credited_meta_stamina]
          properties:
            status:
              type: string
              enum: [accepted, duplicate, quarantined]
            credited_xp:
              type: integer
              minimum: 0
            credited_meta_stamina:
              type: integer
              minimum: 0
            quarantine_reason:
              type: string
              nullable: true
    BattleStartRequest:
      type: object
      properties:
        zone_id:
          type: integer
          minimum: 1
          default: 1
    BattleStartResponse:
      type: object
      required:
        - battle_id
        - result
        - gold_reward
        - damage_dealt
        - damage_taken
        - enemy_power
        - meta_stamina_spent
        - user
      properties:
        battle_id:
          type: string
          format: uuid
        result:
          type: string
          enum: [win, loss]
        gold_reward:
          type: integer
          minimum: 0
        damage_dealt:
          type: integer
          minimum: 0
        damage_taken:
          type: integer
          minimum: 0
        enemy_power:
          type: integer
          minimum: 1
        meta_stamina_spent:
          type: integer
          const: 100
        debuff:
          $ref: '#/components/schemas/DebuffEffect'
          nullable: true
        user:
          type: object
          required: [meta_stamina, gold]
          properties:
            meta_stamina:
              type: integer
              minimum: 0
            gold:
              type: integer
              minimum: 0
    DebuffEffect:
      type: object
      required: [type, value_pct, duration_hours]
      properties:
        type:
          type: string
          enum: [fatigue, injury, sluggish]
        value_pct:
          type: integer
        duration_hours:
          type: integer
          minimum: 1
    BattleRecord:
      type: object
      required:
        - id
        - user_id
        - zone_id
        - result
        - meta_stamina_spent
        - damage_dealt
        - damage_taken
        - gold_reward
        - seed
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
        zone_id:
          type: integer
        result:
          type: string
          enum: [win, loss]
        meta_stamina_spent:
          type: integer
        damage_dealt:
          type: integer
        damage_taken:
          type: integer
        gold_reward:
          type: integer
        seed:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
